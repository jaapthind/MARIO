<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber-Noir Kart 3D</title>
    <style>
        /* =========================================
           ADVANCED HUD & UI CSS (CYBER-NOIR THEME)
           ========================================= */
        :root {
            --neon-pink: #ff00ff;
            --neon-cyan: #00ffff;
            --dark-void: #050510;
            --glass-bg: rgba(10, 10, 25, 0.6);
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--dark-void);
            font-family: 'Courier New', Courier, monospace;
            touch-action: none; /* Crucial for mobile touch handling */
            user-select: none; -webkit-user-select: none;
        }
        #gameCanvas {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh; z-index: 1;
        }
        #ui-layer {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 10;
            pointer-events: none; display: flex;
            flex-direction: column; justify-content: space-between;
        }
        .hud-element {
            background: var(--glass-bg);
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan), inset 0 0 10px var(--neon-cyan);
            color: #fff; text-transform: uppercase; font-weight: bold;
            text-shadow: 0 0 5px var(--neon-cyan); padding: 15px 25px;
            border-radius: 8px; backdrop-filter: blur(5px);
        }
        #top-hud {
            display: flex; justify-content: space-between; padding: 20px;
        }
        #lap-counter { font-size: 28px; }
        #position-tracker { font-size: 28px; color: var(--neon-pink); border-color: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink), inset 0 0 10px var(--neon-pink); text-shadow: 0 0 5px var(--neon-pink);}
        #item-box-ui {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 80px; height: 80px; border: 3px solid var(--neon-cyan);
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            font-size: 40px; background: rgba(0, 255, 255, 0.1);
        }
        #speedometer-container {
            position: absolute; bottom: 180px; right: 20px;
            width: 200px; height: 20px; background: #111;
            border: 2px solid var(--neon-cyan); border-radius: 10px; overflow: hidden;
        }
        #speed-bar {
            width: 0%; height: 100%; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            box-shadow: 0 0 10px var(--neon-pink); transition: width 0.1s linear;
        }
        #speed-text {
            position: absolute; bottom: 210px; right: 20px; font-size: 24px; color: var(--neon-cyan); text-shadow: 0 0 5px var(--neon-cyan);
        }
        
        /* Mobile Touch Controls */
        #mobile-controls {
            display: none; width: 100%; height: 150px;
            pointer-events: auto; justify-content: space-between;
            padding: 20px; box-sizing: border-box; align-items: flex-end;
        }
        .control-group { display: flex; gap: 15px; }
        .btn {
            width: 70px; height: 70px; border-radius: 50%;
            background: rgba(0, 255, 255, 0.1); border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan); font-size: 24px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5) inset; cursor: pointer;
        }
        .btn:active { background: rgba(0, 255, 255, 0.4); box-shadow: 0 0 25px var(--neon-cyan); }
        .btn.action { border-color: var(--neon-pink); color: var(--neon-pink); box-shadow: 0 0 15px rgba(255, 0, 255, 0.5) inset; }
        .btn.action:active { background: rgba(255, 0, 255, 0.4); box-shadow: 0 0 25px var(--neon-pink); }
        
        @media (max-width: 900px) {
            #mobile-controls { display: flex; }
            #speedometer-container { bottom: 20px; right: 50%; transform: translateX(50%); width: 150px; }
            #speed-text { bottom: 50px; right: 50%; transform: translateX(50%); }
            #lap-counter, #position-tracker { font-size: 18px; padding: 10px; }
        }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 16, 0.9); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: auto;
        }
        h1 { color: var(--neon-pink); text-shadow: 0 0 20px var(--neon-pink); font-size: 60px; text-align: center; margin-bottom: 10px; }
        h3 { color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); font-weight: normal; margin-bottom: 40px; }
        #start-btn {
            background: transparent; border: 3px solid var(--neon-cyan); color: var(--neon-cyan);
            font-size: 30px; font-family: inherit; padding: 15px 40px; cursor: pointer;
            text-transform: uppercase; transition: all 0.2s; box-shadow: 0 0 15px var(--neon-cyan) inset;
        }
        #start-btn:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 30px var(--neon-cyan); }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
    <div id="top-hud">
        <div id="lap-counter" class="hud-element">LAP: 1/3</div>
        <div id="item-box-ui">?</div>
        <div id="position-tracker" class="hud-element">POS: 1st</div>
    </div>
    <div id="speed-text">0 MPH</div>
    <div id="speedometer-container"><div id="speed-bar"></div></div>
    
    <div id="mobile-controls">
        <div class="control-group">
            <div class="btn" id="btn-left">◀</div>
            <div class="btn" id="btn-right">▶</div>
        </div>
        <div class="control-group">
            <div class="btn action" id="btn-item" style="font-size:16px;">ITEM</div>
            <div class="btn action" id="btn-brake">B</div>
            <div class="btn action" id="btn-accel">A</div>
        </div>
    </div>
</div>

<div id="start-screen">
    <h1>CYBER-NOIR KART</h1>
    <h3>ADVANCED 3D RACING ENGINE</h3>
    <button id="start-btn">Initialize Race</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    /**
     * =========================================================================
     * CORE ENGINE SETUP & ARCHITECTURE
     * =========================================================================
     */
    const canvas = document.getElementById('gameCanvas');
    const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);
    scene.fog = new THREE.FogExp2(0x050510, 0.003);

    // Dynamic Camera System
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
    const cameraOffset = new THREE.Vector3(0, 10, 25); 

    // Advanced Lighting Structure
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(100, 200, 50);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 1000;
    dirLight.shadow.camera.left = -200;
    dirLight.shadow.camera.right = 200;
    dirLight.shadow.camera.top = 200;
    dirLight.shadow.camera.bottom = -200;
    scene.add(dirLight);

    // Cyber-Noir Neon Point Lights
    const neonPink = new THREE.PointLight(0xff00ff, 2, 300);
    const neonCyan = new THREE.PointLight(0x00ffff, 2, 300);
    scene.add(neonPink);
    scene.add(neonCyan);

    /**
     * =========================================================================
     * TRACK GENERATION (SPLINE MATHEMATICS)
     * =========================================================================
     */
    // Complex 3D Track Waypoints
    const trackPoints = [
        new THREE.Vector3(0, 0, 0),
        new THREE.Vector3(0, 0, -300),
        new THREE.Vector3(200, 20, -500),
        new THREE.Vector3(500, 50, -400),
        new THREE.Vector3(700, 10, -100),
        new THREE.Vector3(600, -20, 200),
        new THREE.Vector3(300, 0, 400),
        new THREE.Vector3(0, 30, 500),
        new THREE.Vector3(-300, 10, 400),
        new THREE.Vector3(-500, -10, 100),
        new THREE.Vector3(-400, 0, -200),
        new THREE.Vector3(-100, 0, -100),
        new THREE.Vector3(0, 0, 0)
    ];
    const path = new THREE.CatmullRomCurve3(trackPoints);
    path.closed = true;

    const trackWidth = 35;
    const trackSegments = 1000;
    
    // Main Road Surface
    const trackGeometry = new THREE.TubeGeometry(path, trackSegments, trackWidth, 12, true);
    const trackMaterial = new THREE.MeshStandardMaterial({ 
        color: 0x111115, roughness: 0.3, metalness: 0.8 
    });
    const trackMesh = new THREE.Mesh(trackGeometry, trackMaterial);
    trackMesh.receiveShadow = true;
    scene.add(trackMesh);

    // Rainbow Grid / Neon Edges
    const edgeGeometry = new THREE.TubeGeometry(path, trackSegments, trackWidth + 2, 8, true);
    const edgeMaterial = new THREE.MeshBasicMaterial({ 
        color: 0xff00ff, wireframe: true, transparent: true, opacity: 0.15 
    });
    const edgeMesh = new THREE.Mesh(edgeGeometry, edgeMaterial);
    scene.add(edgeMesh);

    // Finish Line
    const finishLineGeo = new THREE.BoxGeometry(trackWidth * 2, 2, 5);
    const finishLineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const finishLine = new THREE.Mesh(finishLineGeo, finishLineMat);
    const startPoint = path.getPointAt(0);
    const startTangent = path.getTangentAt(0);
    finishLine.position.copy(startPoint);
    finishLine.lookAt(startPoint.clone().add(startTangent));
    scene.add(finishLine);

    /**
     * =========================================================================
     * CYBER-NOIR ENVIRONMENT
     * =========================================================================
     */
    function buildCity() {
        const cityGeo = new THREE.BoxGeometry(1, 1, 1);
        const cityMat = new THREE.MeshStandardMaterial({ color: 0x050510, metalness: 1.0, roughness: 0.2 });
        
        for(let i=0; i<400; i++) {
            const building = new THREE.Mesh(cityGeo, cityMat);
            const x = (Math.random() - 0.5) * 3000;
            const z = (Math.random() - 0.5) * 3000;
            const d = Math.sqrt(x*x + z*z);
            if (d < 400) continue; // Clear center for track

            const h = Math.random() * 400 + 100;
            building.position.set(x, h/2 - 100, z);
            building.scale.set(Math.random() * 50 + 20, h, Math.random() * 50 + 20);
            
            // Neon Trims
            const edges = new THREE.EdgesGeometry(building.geometry);
            const lineMat = new THREE.LineBasicMaterial({ 
                color: Math.random() > 0.5 ? 0x00ffff : 0xff00ff, 
                transparent: true, opacity: 0.3 
            });
            const lines = new THREE.LineSegments(edges, lineMat);
            building.add(lines);

            scene.add(building);
        }
    }
    buildCity();

    /**
     * =========================================================================
     * ITEM BOX SYSTEM
     * =========================================================================
     */
    const itemBoxes = [];
    const itemBoxGeo = new THREE.BoxGeometry(6, 6, 6);
    const itemBoxMat = new THREE.MeshBasicMaterial({ color: 0xffff00, wireframe: true });
    
    // Spawn item boxes at specific points along the spline
    const spawnPoints = [0.2, 0.5, 0.8];
    spawnPoints.forEach(p => {
        for(let i=-1; i<=1; i++) {
            const box = new THREE.Mesh(itemBoxGeo, itemBoxMat);
            const pos = path.getPointAt(p);
            const tan = path.getTangentAt(p);
            const up = new THREE.Vector3(0,1,0);
            const right = new THREE.Vector3().crossVectors(tan, up).normalize();
            
            pos.add(right.multiplyScalar(i * 15));
            pos.y += 10;
            box.position.copy(pos);
            box.userData = { active: true, respawnTimer: 0 };
            scene.add(box);
            itemBoxes.push(box);
        }
    });

    /**
     * =========================================================================
     * KART & PHYSICS ENTITY CLASS
     * =========================================================================
     */
    class KartEntity {
        constructor(isPlayer, primaryColor, glowColor) {
            this.isPlayer = isPlayer;
            this.mesh = new THREE.Group();
            
            // "Liquid Glass" Aesthetic Shader / Material
            const bodyGeo = new THREE.BoxGeometry(4, 2.5, 9);
            const bodyMat = new THREE.MeshPhysicalMaterial({ 
                color: primaryColor, metalness: 0.9, roughness: 0.05,
                transmission: 0.5, thickness: 1.5,
                emissive: glowColor, emissiveIntensity: 0.4,
                clearcoat: 1.0, clearcoatRoughness: 0.1
            });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 1.25;
            body.castShadow = true;
            this.mesh.add(body);

            // Neon Wheels
            const wheelGeo = new THREE.CylinderGeometry(1.8, 1.8, 1.2, 16);
            wheelGeo.rotateZ(Math.PI / 2);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111, roughness: 0.9 });
            const hubMat = new THREE.MeshBasicMaterial({ color: glowColor });
            
            this.wheels = [];
            const wPos = [ [-2.5, 1.8, 3.5], [2.5, 1.8, 3.5], [-2.5, 1.8, -3.5], [2.5, 1.8, -3.5] ];

            wPos.forEach(p => {
                const wGroup = new THREE.Group();
                const tire = new THREE.Mesh(wheelGeo, wheelMat);
                tire.castShadow = true;
                const hub = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 1.3, 16).rotateZ(Math.PI/2), hubMat);
                wGroup.add(tire); wGroup.add(hub);
                wGroup.position.set(p[0], p[1], p[2]);
                this.mesh.add(wGroup);
                this.wheels.push(wGroup);
            });

            scene.add(this.mesh);

            // Advanced Kinematics & Spline Tracking
            this.progress = 0; // Position along the 3D curve (0 to 1)
            this.lateralOffset = 0; // Distance from center of track
            
            this.speed = 0;
            this.baseMaxSpeed = isPlayer ? 4.5 : 4.0; 
            this.maxSpeed = this.baseMaxSpeed;
            this.accel = 0.02;
            this.friction = 0.01;
            this.handling = 0.6;
            
            this.lap = 1;
            this.lapFlag = false;
            this.heldItem = null;
            this.boostTimer = 0;
            
            // Bot AI Vars
            this.targetOffset = (Math.random() - 0.5) * 40;
            this.botAggression = Math.random() * 0.5 + 0.5;
        }

        update(dt, input) {
            // Apply Boost
            if (this.boostTimer > 0) {
                this.maxSpeed = this.baseMaxSpeed * 1.5;
                this.boostTimer -= dt;
            } else {
                this.maxSpeed = this.baseMaxSpeed;
            }

            if (this.isPlayer) {
                this.handlePlayerInput(input);
            } else {
                this.handleBotAI();
            }

            // Spline Coordinate Calculation
            this.progress += (this.speed * 0.0001);
            
            // Lap Logic
            if (this.progress >= 1.0) {
                this.progress -= 1.0;
                if (!this.lapFlag) {
                    this.lap++;
                    this.lapFlag = true;
                    if(this.isPlayer) updateLapUI();
                }
            }
            if (this.progress > 0.1 && this.progress < 0.9) this.lapFlag = false;
            if (this.progress < 0) this.progress += 1.0;

            // Clamp Lateral Offset to keep on track
            this.lateralOffset = THREE.MathUtils.clamp(this.lateralOffset, -(trackWidth-3), (trackWidth-3));

            // Calculate exact 3D position based on progress and offset
            const currentPoint = path.getPointAt(this.progress);
            const tangent = path.getTangentAt(this.progress).normalize();
            
            // Up vector approximation for banking
            const axis = new THREE.Vector3(0, 1, 0);
            const up = new THREE.Vector3().crossVectors(tangent, axis).cross(tangent).normalize().multiplyScalar(-1);
            const right = new THREE.Vector3().crossVectors(tangent, up).normalize();

            // Apply position
            const finalPos = currentPoint.clone().add(right.multiplyScalar(this.lateralOffset));
            this.mesh.position.copy(finalPos);
            this.mesh.position.y += 1.5; // Ride height
            
            // Orientation matrix to align with track
            const lookAtPoint = path.getPointAt((this.progress + 0.01) % 1).add(right.multiplyScalar(this.lateralOffset));
            this.mesh.lookAt(lookAtPoint);

            // Wheel Animation
            this.wheels.forEach(w => w.rotation.x -= this.speed * 0.1);
            
            if(this.isPlayer) this.checkItemCollisions();
        }

        handlePlayerInput(input) {
            if (input.up) this.speed += this.accel;
            if (input.down) this.speed -= this.accel * 2;
            
            // Friction/Drag
            if (!input.up && !input.down) {
                if (this.speed > 0) this.speed -= this.friction;
                if (this.speed < 0) this.speed += this.friction;
                if (Math.abs(this.speed) < this.friction) this.speed = 0;
            }

            this.speed = THREE.MathUtils.clamp(this.speed, -1, this.maxSpeed);

            // Steering modifies lateral offset relative to speed
            if (Math.abs(this.speed) > 0.1) {
                const steerStrength = (this.speed / this.maxSpeed) * this.handling;
                if (input.left) this.lateralOffset -= steerStrength;
                if (input.right) this.lateralOffset += steerStrength;
            }

            // Update Lights
            neonCyan.position.copy(this.mesh.position);
            neonCyan.position.y += 10;
        }

        handleBotAI() {
            // Auto acceleration
            if (this.speed < this.maxSpeed * this.botAggression) {
                this.speed += this.accel * 0.8;
            }

            // Smooth steering towards target offset
            if (Math.abs(this.lateralOffset - this.targetOffset) > 1) {
                this.lateralOffset += (this.targetOffset > this.lateralOffset ? 1 : -1) * this.handling * 0.5;
            } else {
                // Randomly change lane
                if (Math.random() < 0.01) {
                    this.targetOffset = (Math.random() - 0.5) * (trackWidth * 1.5);
                }
            }
        }

        checkItemCollisions() {
            itemBoxes.forEach(box => {
                if (!box.userData.active) return;
                const dist = this.mesh.position.distanceTo(box.position);
                if (dist < 10) {
                    box.userData.active = false;
                    box.visible = false;
                    box.userData.respawnTimer = 300; // frames
                    
                    // Assign random item
                    const items = ['MUSHROOM', 'STAR', 'COIN'];
                    this.heldItem = items[Math.floor(Math.random() * items.length)];
                    document.getElementById('item-box-ui').innerText = '🎁';
                }
            });
        }

        useItem() {
            if (!this.heldItem) return;
            
            if (this.heldItem === 'MUSHROOM' || this.heldItem === 'STAR') {
                this.boostTimer = 100; // Boost duration
            }
            
            this.heldItem = null;
            document.getElementById('item-box-ui').innerText = '?';
        }
    }

    /**
     * =========================================================================
     * INITIALIZATION & INPUT STATE
     * =========================================================================
     */
    let gameActive = false;
    let racers = [];
    let player;

    const input = { up: false, down: false, left: false, right: false };

    function initGame() {
        document.getElementById('start-screen').style.display = 'none';
        
        // Create Player
        player = new KartEntity(true, 0x00ffff, 0xff00ff);
        player.progress = 0;
        racers.push(player);

        // Create Advanced Bots
        const botColors = [
            [0xff0000, 0xffaa00], [0x00ff00, 0x005500], 
            [0xffff00, 0xff5500], [0xffffff, 0x5555ff],
            [0xff00ff, 0x0000ff], [0xff5500, 0xff0000],
            [0x00ffaa, 0x005555]
        ];
        
        for(let i=0; i<7; i++) {
            const bot = new KartEntity(false, botColors[i][0], botColors[i][1]);
            bot.progress = -(i + 1) * 0.01; // Staggered start
            bot.lateralOffset = (i % 2 === 0 ? 1 : -1) * 10;
            racers.push(bot);
        }

        gameActive = true;
        animate();
    }

    // Keyboard Bindings
    window.addEventListener('keydown', (e) => {
        if (!gameActive) return;
        if (e.key === 'ArrowUp' || e.key === 'w') input.up = true;
        if (e.key === 'ArrowDown' || e.key === 's') input.down = true;
        if (e.key === 'ArrowLeft' || e.key === 'a') input.left = true;
        if (e.key === 'ArrowRight' || e.key === 'd') input.right = true;
        if (e.key === ' ' || e.key === 'Shift') player.useItem();
    });

    window.addEventListener('keyup', (e) => {
        if (e.key === 'ArrowUp' || e.key === 'w') input.up = false;
        if (e.key === 'ArrowDown' || e.key === 's') input.down = false;
        if (e.key === 'ArrowLeft' || e.key === 'a') input.left = false;
        if (e.key === 'ArrowRight' || e.key === 'd') input.right = false;
    });

    // Mobile Touch Bindings
    function bindTouch(id, keyAction, isItem = false) {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(isItem) player.useItem(); else input[keyAction] = true;
        });
        el.addEventListener('touchend', (e) => {
            e.preventDefault();
            if(!isItem) input[keyAction] = false;
        });
    }
    bindTouch('btn-accel', 'up');
    bindTouch('btn-brake', 'down');
    bindTouch('btn-left', 'left');
    bindTouch('btn-right', 'right');
    bindTouch('btn-item', '', true);

    document.getElementById('start-btn').addEventListener('click', initGame);

    /**
     * =========================================================================
     * UI & GAME LOOP LOGIC
     * =========================================================================
     */
    function updateLapUI() {
        if (player.lap > 3) {
            document.getElementById('lap-counter').innerText = "RACE FINISHED!";
            gameActive = false; // End game
        } else {
            document.getElementById('lap-counter').innerText = `LAP: ${player.lap}/3`;
        }
    }

    function calculatePositions() {
        // Sort racers by lap and then progress
        let sorted = [...racers].sort((a, b) => {
            if (b.lap !== a.lap) return b.lap - a.lap;
            return b.progress - a.progress;
        });
        
        let playerPos = sorted.indexOf(player) + 1;
        let suffix = "th";
        if (playerPos === 1) suffix = "st";
        else if (playerPos === 2) suffix = "nd";
        else if (playerPos === 3) suffix = "rd";
        
        document.getElementById('position-tracker').innerText = `POS: ${playerPos}${suffix}`;
    }

    const clock = new THREE.Clock();

    function animate() {
        if (!gameActive) return;
        requestAnimationFrame(animate);

        const dt = clock.getDelta();

        // Update all physics entities
        racers.forEach(r => r.update(dt, input));

        // Update Camera (Third-Person Follow)
        if (player) {
            const relativeCameraOffset = cameraOffset.clone();
            const cameraMatrix = new THREE.Matrix4().extractRotation(player.mesh.matrix);
            const absoluteOffset = relativeCameraOffset.applyMatrix4(cameraMatrix);
            
            const targetCamPos = player.mesh.position.clone().add(absoluteOffset);
            camera.position.lerp(targetCamPos, 0.1);
            camera.lookAt(player.mesh.position.clone().add(new THREE.Vector3(0, 2, 0)));

            // Update UI Speedometer
            const speedMph = Math.floor(Math.abs(player.speed) * 30);
            document.getElementById('speed-text').innerText = `${speedMph} MPH`;
            document.getElementById('speed-bar').style.width = `${Math.min(100, (speedMph / 150) * 100)}%`;
        }

        // Handle Item Box Animation & Respawning
        itemBoxes.forEach(box => {
            box.rotation.y += 0.05;
            box.rotation.x += 0.02;
            if (!box.userData.active) {
                box.userData.respawnTimer--;
                if (box.userData.respawnTimer <= 0) {
                    box.userData.active = true;
                    box.visible = true;
                }
            }
        });

        // Compute standings
        if(Math.random() < 0.1) calculatePositions(); // Don't calc every frame

        renderer.render(scene, camera);
    }

    // Responsive Window Resizing
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
