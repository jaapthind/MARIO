        /* ==========================================================================
           ULTIMATE 3D SOUNDBOARD CSS ARCHITECTURE
           ========================================================================== */
        :root {
            --bg-color: #0f0f13;
            --panel-bg: #1a1a24;
            --text-main: #ffffff;
            --text-dim: #8888a0;
            --accent: #00f3ff;
            --accent-glow: rgba(0, 243, 255, 0.4);
            --btn-depth: 10px;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --header-height: 120px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% 0%, #2a2a3a 0%, transparent 50%),
                linear-gradient(0deg, var(--bg-color) 0%, #15151e 100%);
            min-height: 100vh;
        }

        /* --- Header & Visualizer --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background: rgba(20, 20, 28, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1400px;
            padding: 0 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #ff007f, #00f3ff, #ff007f);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-shift 3s linear infinite;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .master-volume {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 150px;
            background: rgba(255,255,255,0.1);
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .stop-btn {
            background: #ff2a2a;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #8b0000;
            transition: all 0.1s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stop-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #8b0000;
        }

        /* --- Audio Visualizer Canvas --- */
        #visualizer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            pointer-events: none;
            opacity: 0.6;
        }

        /* --- Main Grid Layout --- */
        main {
            padding-top: calc(var(--header-height) + 40px);
            padding-bottom: 100px;
            display: flex;
            justify-content: center;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1600px;
            padding: 0 2rem;
        }

        /* ==========================================================================
           3D BUTTON STYLING (ADVANCED)
           ========================================================================== */
        .sound-btn {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            border: none;
            border-radius: 20px;
            background: transparent;
            cursor: pointer;
            outline: none;
            perspective: 1000px;
            transform-style: preserve-3d;
        }

        /* Base pedestal (bottom layer) */
        .btn-base {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #000;
            border-radius: 20px;
            box-shadow: 
                0 var(--btn-depth) 20px rgba(0,0,0,0.8),
                inset 0 -2px 5px rgba(255,255,255,0.1);
            transform: translateZ(-10px);
        }

        /* The moving part (top layer) */
        .btn-cap {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: var(--btn-depth);
            background: linear-gradient(135deg, var(--btn-color-1), var(--btn-color-2));
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            transition: transform 0.1s cubic-bezier(0.4, 0.0, 0.2, 1);
            box-shadow: 
                inset 0 2px 2px rgba(255,255,255,0.4),
                inset 0 -5px 15px rgba(0,0,0,0.3),
                0 5px 10px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        /* Inner glowing rim */
        .btn-cap::before {
            content: '';
            position: absolute;
            top: 2px; left: 2px; right: 2px; bottom: 2px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
        }

        /* Text styling */
        .btn-text {
            color: #fff;
            font-size: 1rem;
            font-weight: 800;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            line-height: 1.2;
            word-wrap: break-word;
            max-width: 100%;
            z-index: 2;
        }

        /* Play Icon overlay */
        .play-icon {
            position: absolute;
            opacity: 0.1;
            font-size: 4rem;
            color: #fff;
            z-index: 1;
            transform: scale(0.8);
            transition: all 0.2s;
        }

        /* --- Active / Pressed State --- */
        .sound-btn:active .btn-cap, 
        .sound-btn.playing .btn-cap {
            transform: translateY(calc(var(--btn-depth) - 2px));
            box-shadow: 
                inset 0 2px 2px rgba(255,255,255,0.2),
                inset 0 -2px 5px rgba(0,0,0,0.5),
                0 0 15px var(--btn-color-1);
        }

        .sound-btn.playing .play-icon {
            opacity: 0.3;
            transform: scale(1.1);
        }

        .sound-btn.playing .btn-text {
            text-shadow: 0 0 10px #fff;
        }

        /* --- Categories / Colors --- */
        .color-red { --btn-color-1: #ff3366; --btn-color-2: #ba0033; }
        .color-blue { --btn-color-1: #00e5ff; --btn-color-2: #007799; }
        .color-green { --btn-color-1: #00ff88; --btn-color-2: #008844; }
        .color-purple { --btn-color-1: #b000ff; --btn-color-2: #550088; }
        .color-orange { --btn-color-1: #ff9900; --btn-color-2: #aa5500; }
        .color-yellow { --btn-color-1: #ffee00; --btn-color-2: #998800; }
        .color-pink { --btn-color-1: #ff00aa; --btn-color-2: #880055; }
        .color-dark { --btn-color-1: #444455; --btn-color-2: #11111a; }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Particle effects container */
        #particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        /* Loading Overlay */
        #loader {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: var(--bg-color);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        @media (max-width: 768px) {
            .grid-container { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; padding: 0 1rem; }
            h1 { font-size: 1.5rem; }
            .btn-text { font-size: 0.8rem; }
            .header-top { flex-direction: column; gap: 10px; }
            :root { --header-height: 140px; }
        }
    </style>

        /**
         * Audio Engine Implementation using Web Audio API
         * Allows precise control, multiple overlapping sounds, and visualization.
         */
        class SoundEngine {
            constructor() {
                this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                this.masterGain = this.audioCtx.createGain();
                this.analyser = this.audioCtx.createAnalyser();
                
                // Routing: Nodes -> MasterGain -> Analyser -> Destination
                this.masterGain.connect(this.analyser);
                this.analyser.connect(this.audioCtx.destination);
                
                this.masterGain.gain.value = 0.7; // Default volume
                this.analyser.fftSize = 256;
                this.bufferLength = this.analyser.frequencyBinCount;
                this.dataArray = new Uint8Array(this.bufferLength);
                
                this.buffers = new Map(); // Cache decoded audio data
                this.activeSources = []; // Track currently playing sources
            }

            setVolume(val) {
                this.masterGain.gain.value = val;
            }

            stopAll() {
                this.activeSources.forEach(source => {
                    try { source.stop(); } catch(e) {}
                });
                this.activeSources = [];
                // Visual reset
                document.querySelectorAll('.sound-btn').forEach(btn => btn.classList.remove('playing'));
            }

            async fetchAndDecode(url) {
                if (this.buffers.has(url)) return this.buffers.get(url);
                try {
                    const response = await fetch(url);
                    const arrayBuffer = await response.arrayBuffer();
                    const audioBuffer = await this.audioCtx.decodeAudioData(arrayBuffer);
                    this.buffers.set(url, audioBuffer);
                    return audioBuffer;
                } catch (e) {
                    console.error("Error loading sound:", url);
                    return null;
                }
            }

            async playSound(url, btnElement) {
                if (this.audioCtx.state === 'suspended') {
                    await this.audioCtx.resume();
                }

                // If not cached, it might take a ms to fetch, add loading state
                if(!this.buffers.has(url)) {
                    btnElement.style.opacity = '0.5';
                }

                const buffer = await this.fetchAndDecode(url);
                btnElement.style.opacity = '1';

                if (!buffer) return;

                const source = this.audioCtx.createBufferSource();
                source.buffer = buffer;
                source.connect(this.masterGain);
                source.start(0);
                this.activeSources.push(source);

                // UI update
                btnElement.classList.add('playing');
                createParticles(btnElement);

                source.onended = () => {
                    btnElement.classList.remove('playing');
                    this.activeSources = this.activeSources.filter(s => s !== source);
                };
            }
        }

        const engine = new SoundEngine();

        // --- Visualizer Setup ---
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        let visWidth, visHeight;

        function resizeCanvas() {
            visWidth = canvas.width = window.innerWidth;
            visHeight = canvas.height = 40;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function drawVisualizer() {
            requestAnimationFrame(drawVisualizer);
            engine.analyser.getByteFrequencyData(engine.dataArray);

            ctx.clearRect(0, 0, visWidth, visHeight);
            
            const barWidth = (visWidth / engine.bufferLength) * 2.5;
            let barHeight;
            let x = 0;

            for (let i = 0; i < engine.bufferLength; i++) {
                barHeight = engine.dataArray[i] / 2;
                
                const gradient = ctx.createLinearGradient(0, visHeight, 0, visHeight - barHeight);
                gradient.addColorStop(0, '#00f3ff');
                gradient.addColorStop(1, '#ff007f');

                ctx.fillStyle = gradient;
                ctx.fillRect(x, visHeight - barHeight, barWidth, barHeight);
                x += barWidth + 1;
            }
        }
        drawVisualizer();

        // --- Particle System for Clicks ---
        const pCanvas = document.getElementById('particles');
        const pCtx = pCanvas.getContext('2d');
        pCanvas.width = window.innerWidth;
        pCanvas.height = window.innerHeight;
        let particlesArray = [];

        window.addEventListener('resize', () => {
            pCanvas.width = window.innerWidth;
            pCanvas.height = window.innerHeight;
        });

        class Particle {
            constructor(x, y, colorStr) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 5 + 2;
                this.speedX = Math.random() * 6 - 3;
                this.speedY = Math.random() * -6 - 2;
                // Parse color class to hex for particles
                const colors = {
                    'color-red': '#ff3366', 'color-blue': '#00e5ff',
                    'color-green': '#00ff88', 'color-purple': '#b000ff',
                    'color-orange': '#ff9900', 'color-yellow': '#ffee00',
                    'color-pink': '#ff00aa', 'color-dark': '#888899'
                };
                this.color = colors[colorStr] || '#ffffff';
                this.gravity = 0.2;
                this.life = 1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += this.gravity;
                this.life -= 0.02;
            }
            draw() {
                pCtx.save();
                pCtx.globalAlpha = this.life;
                pCtx.fillStyle = this.color;
                pCtx.beginPath();
                pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                pCtx.fill();
                pCtx.restore();
            }
        }

        function createParticles(element) {
            const rect = element.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            const colorClass = Array.from(element.classList).find(c => c.startsWith('color-'));
            for (let i = 0; i < 15; i++) {
                particlesArray.push(new Particle(x, y, colorClass));
            }
        }

        function animateParticles() {
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
                if (particlesArray[i].life <= 0) {
                    particlesArray.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // --- DOM Initialization ---
        const grid = document.getElementById('sound-grid');

        function renderButtons() {
            const fragment = document.createDocumentFragment();

            memeDatabase.forEach((meme, index) => {
                const btn = document.createElement('button');
                btn.className = `sound-btn color-${meme.color}`;
                btn.id = `btn-${index}`;
                btn.setAttribute('aria-label', `Play ${meme.name}`);

                const base = document.createElement('div');
                base.className = 'btn-base';

                const cap = document.createElement('div');
                cap.className = 'btn-cap';

                const text = document.createElement('span');
                text.className = 'btn-text';
                text.textContent = meme.name;

                const icon = document.createElement('span');
                icon.className = 'play-icon';
                icon.innerHTML = '▶';

                cap.appendChild(icon);
                cap.appendChild(text);
                btn.appendChild(base);
                btn.appendChild(cap);

                // Event Listeners for precise playback
                btn.addEventListener('pointerdown', (e) => {
                    // Prevent context menu on mobile
                    e.preventDefault(); 
                    const url = `${BASE_URL}${meme.file}`;
                    engine.playSound(url, btn);
                });

                // Pre-cache the first 10 sounds on load to ensure instant feedback
                if (index < 10) {
                    engine.fetchAndDecode(`${BASE_URL}${meme.file}`);
                }

                fragment.appendChild(btn);
            });

            grid.appendChild(fragment);
        }

        // Setup Controls
        document.getElementById('volume-slider').addEventListener('input', (e) => {
            engine.setVolume(e.target.value);
        });

        document.getElementById('stop-all').addEventListener('click', () => {
            engine.stopAll();
            // Button physical push effect
            const btn = document.getElementById('stop-all');
            btn.style.transform = 'translateY(4px)';
            setTimeout(() => btn.style.transform = 'translateY(0)', 100);
        });

        // Initialize App
        window.addEventListener('DOMContentLoaded', () => {
            renderButtons();
            
            // Remove Loader after slight delay to simulate massive payload processing
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 800);
        });

    </script>
